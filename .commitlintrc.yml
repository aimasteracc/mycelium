extends:
  - '@commitlint/config-conventional'

rules:
  type-enum:
    - 2
    - always
    - [feat, fix, docs, style, refactor, perf, test, build, ci, chore, meta, revert]
  scope-enum:
    - 2
    - always
    - [core, hyphae, pack, cli, mcp, bindings, docs, hive, ci, release, deps, charter, governance, security]
  scope-case:
    - 2
    - always
    - lower-case
  subject-case:
    - 2
    - never
    - [pascal-case, upper-case]
  subject-empty:
    - 2
    - never
  subject-full-stop:
    - 2
    - never
    - '.'
  header-max-length:
    - 2
    - always
    - 100
  body-leading-blank:
    - 1
    - always
  footer-leading-blank:
    - 1
    - always
  signed-off-by:
    - 2
    - always
    - 'Signed-off-by:'
