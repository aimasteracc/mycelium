name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: fuzz (1 hour)
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@cargo-fuzz
      - run: |
          if [ -d "fuzz" ]; then
            for target in $(cargo fuzz list 2>/dev/null); do
              echo "::group::fuzzing $target for 10m"
              cargo fuzz run "$target" -- -max_total_time=600 || true
              echo "::endgroup::"
            done
          else
            echo "no fuzz/ directory yet — skipping"
          fi

  bench:
    name: benchmarks (criterion)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          if find . -name "*.rs" -path "*/benches/*" | grep -q .; then
            cargo bench --workspace -- --output-format bencher | tee bench-results.txt
          else
            echo "no benches yet — skipping"
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bench-results
          path: bench-results.txt
          if-no-files-found: ignore

  redb-sla-100k:
    name: redb SLA (100k nodes, Charter §2)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Charter §2 mandates the latency SLAs at 100k nodes. The gate is
      # env-guarded so PR CI stays fast; the nightly proves the redb path holds
      # at the contract's scale (cold lookup < 5 ms, 3-hop < 1 ms). Release mode
      # for representative timing.
      - name: 100k redb SLA gate
        env:
          MYCELIUM_REDB_BENCH_100K: '1'
        run: |
          cargo test --release -p mycelium-rcig-core --features redb-backend \
            --test redb_sla redb_ -- --nocapture

  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          if [ -d "tests/e2e" ]; then
            cargo test --test '*e2e*' --release
          else
            echo "no tests/e2e yet — skipping"
          fi
        shell: bash

  mutants:
    name: mutation testing (kill-rate gate >= 70%)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run mutation tests
        run: |
          cargo mutants --workspace --timeout 60 --jobs 4 2>&1 | tee mutants.out
      - name: Enforce >= 70% kill rate
        shell: bash
        run: |
          # cargo-mutants summary line looks like:
          #   "42 missed, 120 caught, 3 unviable, 5 timeout in 5.00s"
          # We extract caught and missed from that line.
          SUMMARY=$(grep -E 'missed|caught' mutants.out | tail -1)
          echo "Summary line: $SUMMARY"
          CAUGHT=$(echo "$SUMMARY" | grep -oP '\d+(?= caught)')
          MISSED=$(echo "$SUMMARY" | grep -oP '\d+(?= missed)')
          # Default to 0 if not found (no mutants means nothing to gate)
          CAUGHT=${CAUGHT:-0}
          MISSED=${MISSED:-0}
          TOTAL=$((CAUGHT + MISSED))
          echo "caught=$CAUGHT  missed=$MISSED  total=$TOTAL"
          if [ "$TOTAL" -eq 0 ]; then
            echo "No viable mutants found -- skipping kill-rate gate."
            exit 0
          fi
          KILL_RATE=$((CAUGHT * 100 / TOTAL))
          echo "Kill rate: ${KILL_RATE}%  (threshold: 70%)"
          if [ "$KILL_RATE" -lt 70 ]; then
            echo "::error::Mutation kill rate ${KILL_RATE}% is below the required 70% threshold (Charter 2)."
            exit 1
          fi
          echo "Kill rate ${KILL_RATE}% meets the >= 70% SLA."
      - name: Upload mutants report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutants-report
          path: mutants.out
          if-no-files-found: ignore
