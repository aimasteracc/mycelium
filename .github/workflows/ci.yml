name: CI

# Single coordinator. Per Charter §5.6 and GITFLOW.md, the aggregator job
# `quality-gate` is the ONLY required check on branch protection rules.

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:
  # Allow release.yml to reuse this workflow as `uses: ./.github/workflows/ci.yml`
  # for the quality-recheck step before crates.io publish.
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Fast lane (Charter §5.6: must finish in < 5 minutes)
  # Jobs: fmt + clippy + unit (--lib --bins only)
  # Timeouts enforce the SLA; they do not merely bound runaway jobs.
  # ─────────────────────────────────────────────────────────────

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  unit:
    name: unit tests (linux stable)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib --bins

  # ─────────────────────────────────────────────────────────────
  # Full lane (Charter §5.6: must finish in < 20 minutes)
  # Integration tests run after the fast lane passes.
  # ─────────────────────────────────────────────────────────────

  integration:
    name: integration tests (linux stable)
    needs: [fmt, clippy, unit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Run integration test binaries (tests/ directories).
      - run: cargo test --workspace --tests
      # Run filesystem-watch tests (marked #[ignore] for local fast lane).
      # Timeout budget raised to 15 min to absorb FSE debounce on GH runners.
      # watch_mode_resolves_stub_after_callee_file_added is excluded — the FSE
      # watcher does not reliably fire on file *creation* under tempdir paths in
      # GitHub-Actions runners, even with a 30 s budget. Tracked as a follow-up
      # bug (see decisions.jsonl). The other watch_mode tests still run.
      - run: |
          cargo test -p mycelium-rcig-mcp --lib -- --include-ignored watch_mode \
            --skip watch_mode_resolves_stub_after_callee_file_added

  test-matrix:
    name: tests (${{ matrix.os }} / ${{ matrix.toolchain }})
    needs: [fmt, clippy]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]
        include:
          - os: ubuntu-latest
            toolchain: nightly
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  coverage:
    name: coverage
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        # cargo-llvm-cov has no `--fail-under-branches` flag; only lines.
        # Branch % is uploaded to Codecov below; gating happens there.
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info --fail-under-lines 90
      - name: Generate coverage JSON (branch % for Codecov)
        run: cargo llvm-cov --workspace --all-features --json --output-path coverage.json --no-run
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
        if: ${{ env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # security and doc-build run after the fast lane to avoid blocking it.
  # They are still required by quality-gate.

  security:
    name: security
    needs: [unit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      # cargo-deny's [advisories] section in deny.toml already runs the
      # RustSec advisory check that cargo-audit duplicates. Running both
      # was both redundant and persistently red: cargo-audit re-clones the
      # advisory-db every run, and the GH-Actions runner network reliably
      # fails that fetch ("failed to prepare clone"). cargo-deny gets the
      # same coverage through its cached fetch path.
      - run: cargo deny check

  build-validation:
    name: build (release)
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace --all-features

      # RFC-0110: validate the npm packaging path end-to-end on every PR using
      # the just-built linux-x64 binary — assemble the packages, install them
      # (--install-links copies like a registry install), and run the launcher.
      # Catches packaging/launcher regressions without a real publish.
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: npm launcher unit tests
        run: node --test
        working-directory: npm/mycelium
      # RFC-0111: SDK thin-wrapper. Unit tests are hermetic (injected spawn);
      # the integration test then round-trips real JSON through the SDK using
      # the release binary just built above, proving the --format json contract.
      - name: SDK unit tests
        run: node --test
        working-directory: npm/sdk
      - name: SDK integration test (against built binary)
        run: node --test
        working-directory: npm/sdk
        env:
          MYCELIUM_BIN: ${{ github.workspace }}/target/release/mycelium
      - name: npm packaging smoke test (assemble → install → run)
        run: |
          set -euo pipefail
          mkdir -p dist-bin/linux-x64
          cp target/release/mycelium dist-bin/linux-x64/mycelium
          node npm/scripts/build-npm.mjs --version 0.0.0-ci --bin-dir dist-bin --out dist-npm
          mkdir -p smoke && cd smoke && npm init -y >/dev/null
          npm install --install-links ../dist-npm/mycelium-linux-x64-gnu ../dist-npm/mycelium >/dev/null
          OUT="$(node_modules/.bin/mycelium --version)"
          echo "launcher output: $OUT"
          echo "$OUT" | grep -qi mycelium
      # RFC-0111: prove the assembled SDK resolves the prebuilt binary from its
      # pinned optionalDependency (no MYCELIUM_BIN, no PATH) — the exact
      # no-Cargo install path a fresh `npm i @aimasteracc/mycelium-sdk` takes.
      - name: SDK packaging smoke test (assemble → install → resolve binary → query)
        run: |
          set -euo pipefail
          mkdir -p sdk-smoke && cd sdk-smoke && npm init -y >/dev/null
          npm install --install-links \
            ../dist-npm/mycelium-linux-x64-gnu ../dist-npm/mycelium-sdk >/dev/null
          node -e '
            const { Mycelium } = require("@aimasteracc/mycelium-sdk");
            const m = new Mycelium({ root: "." });
            m.version().then((v) => {
              console.log("sdk resolved binary →", v);
              if (!/^mycelium /.test(v)) process.exit(1);
            }).catch((e) => { console.error(e); process.exit(1); });
          '
      # RFC-0111 Phase 2: Python SDK (mycelium-rcig). Unit tests are hermetic
      # (injected spawn, stdlib unittest — no pip install); the integration run
      # round-trips real JSON through the SDK using the release binary above.
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Python SDK unit tests
        run: python -m unittest discover -s tests
        working-directory: bindings/python
      - name: Python SDK integration test (against built binary)
        run: python -m unittest discover -s tests
        working-directory: bindings/python
        env:
          MYCELIUM_BIN: ${{ github.workspace }}/target/release/mycelium

  doc-build:
    name: docs (rustdoc + mdbook)
    needs: [unit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D rustdoc::broken-intra-doc-links"
      - name: Install mdbook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - run: mdbook build docs
        continue-on-error: true  # docs/ may not exist on day 0

  commit-conventions:
    name: commit lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: '.commitlintrc.yml'
        continue-on-error: true  # warn for now; fail after .commitlintrc.yml is in repo

  dco-check:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          MISSING=0
          # --no-merges so historical PR merge commits (which never carried
          # sign-off and predate DCO enforcement) don't fail back-merge PRs
          # like release/* → develop. Authored commits must still sign off.
          #
          # Use full body grep instead of %(trailers:key=...) because GitHub
          # squash-merge embeds Signed-off-by lines in the middle of the body
          # (between individual commit entries) rather than as trailing lines,
          # so the trailer parser misses them and false-fails those commits.
          for sha in $(git rev-list --no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}); do
            if ! git log -1 --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+>'; then
              echo "::error::Commit $sha lacks Signed-off-by trailer (DCO)."
              MISSING=$((MISSING+1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "$MISSING commit(s) missing DCO sign-off. Run: git rebase -i --signoff <base>"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # Three-Surface Rule parity (Charter §5.13 / RFC-0090).
  # Promoted to required gate in v0.1.14 once 89/89 coverage landed.
  # ─────────────────────────────────────────────────────────────
  skill-parity:
    name: Skill coverage check (I1 + I2)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Run Three-Surface parity checker (strict)
        run: python3 scripts/check_skill_parity.py --strict

  governance:
    name: governance guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Run release and governance guardrail checks
        run: |
          bash scripts/test-release-prep.sh
          bash scripts/test-release-workflow.sh
          bash scripts/check_governance_guardrails.sh
          bash scripts/check_supersede_discipline.sh

  # ─────────────────────────────────────────────────────────────
  # The single required check.
  # Branch protection rules require this and ONLY this to be green.
  # ─────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    needs:
      - fmt
      - clippy
      - unit
      - integration
      - test-matrix
      - coverage
      - security
      - build-validation
      - doc-build
      - dco-check
      - skill-parity
      - governance
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          fail=0
          declare -A results=(
            [fmt]="${{ needs.fmt.result }}"
            [clippy]="${{ needs.clippy.result }}"
            [unit]="${{ needs.unit.result }}"
            [integration]="${{ needs.integration.result }}"
            [test-matrix]="${{ needs.test-matrix.result }}"
            [coverage]="${{ needs.coverage.result }}"
            [security]="${{ needs.security.result }}"
            [build-validation]="${{ needs.build-validation.result }}"
            [doc-build]="${{ needs.doc-build.result }}"
            [dco-check]="${{ needs.dco-check.result }}"
            [skill-parity]="${{ needs.skill-parity.result }}"
            [governance]="${{ needs.governance.result }}"
          )
          for k in "${!results[@]}"; do
            v="${results[$k]}"
            echo "  $k: $v"
            if [ "$v" != "success" ] && [ "$v" != "skipped" ]; then
              fail=$((fail+1))
            fi
          done
          if [ $fail -gt 0 ]; then
            echo "Quality Gate FAILED. $fail required job(s) did not succeed."
            exit 1
          fi
          echo "Quality Gate PASSED."
