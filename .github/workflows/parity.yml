name: Three-Surface Parity (RFC-0090)

# Checks that every MCP tool is referenced in ≥1 Skill's allowed-tools
# (Invariant I1) and that every Skill reference resolves to a real MCP
# tool (Invariant I2).
#
# Phase 3 (v0.1.6+): --strict — exits non-zero on any I1/I2 violation.
# Promoted from informational after v0.1.5 hit 89/89 (100%) coverage.
# Branch protection should mark this check as required on main; until
# that flips, the job's red status is still actionable to PR authors
# via the standard check display.

on:
  push:
    branches: [develop]
    paths:
      - "crates/mycelium-mcp/src/**"
      - "crates/mycelium-cli/src/**"
      - "skills/**"
      - "scripts/check_skill_parity.py"
      - "packs/**"
      - "crates/mycelium-mcp/packs/**"
      - "crates/mycelium-cli/packs/**"
      - "scripts/check_pack_parity.sh"
  pull_request:
    paths:
      - "crates/mycelium-mcp/src/**"
      - "crates/mycelium-cli/src/**"
      - "skills/**"
      - "scripts/check_skill_parity.py"
      - "packs/**"
      - "crates/mycelium-mcp/packs/**"
      - "crates/mycelium-cli/packs/**"
      - "scripts/check_pack_parity.sh"

jobs:
  parity-check:
    name: Skill coverage check (I1 + I2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Three-Surface parity checker (strict)
        run: python3 scripts/check_skill_parity.py --strict

  pack-parity:
    name: Pack query parity (canonical vs embedded copies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check pack queries match canonical packs/
        run: bash scripts/check_pack_parity.sh
