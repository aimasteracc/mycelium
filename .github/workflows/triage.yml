name: Triage

on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened]
  schedule:
    - cron: '0 * * * *'  # hourly stale sweep

jobs:
  welcome-and-label:
    name: welcome + initial labels
    if: github.event_name == 'issues' || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Add 'needs-triage' label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: needs-triage
      - name: Welcome first-time contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Hi! 👋 Thanks for opening your first issue in Mycelium.

            A maintainer (or the Triage agent) will respond within 48 hours.

            In the meantime, please make sure you:
            - Reviewed [CONTRIBUTING.md](https://github.com/aimasteracc/mycelium/blob/develop/CONTRIBUTING.md)
            - Searched [existing issues](https://github.com/aimasteracc/mycelium/issues?q=) for duplicates
            - Read the [Code of Conduct](https://github.com/aimasteracc/mycelium/blob/develop/CODE_OF_CONDUCT.md)

            Welcome to the network. 🍄
          pr-message: |
            Hi! 👋 Thanks for your first PR to Mycelium.

            Per [CONTRIBUTING.md](https://github.com/aimasteracc/mycelium/blob/develop/CONTRIBUTING.md):

            - PRs target `develop`, not `main`
            - Every commit must have `Signed-off-by:` (DCO). Use `git commit -s`.
            - [Conventional Commits](https://www.conventionalcommits.org/) message format
            - Tests should precede implementation (Charter §5.1)

            The Reviewer agent will do an automated first pass shortly.

            Welcome to the network. 🍄

  stale-sweep:
    name: hourly stale sweep
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 14
          days-before-issue-close: 7
          stale-issue-message: |
            This issue has been inactive for 14 days. It will be closed in 7 days if there's no further activity.

            If this is still relevant, please leave a comment.
          close-issue-message: |
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          stale-issue-label: stale
          exempt-issue-labels: "priority:critical,priority:high,confirmed,blocked"
          days-before-pr-stale: 14
          days-before-pr-close: 30
          stale-pr-message: |
            This PR has been inactive for 14 days. Please rebase against `develop` and address any pending review comments.
          stale-pr-label: stale-pr
          exempt-pr-labels: "do-not-close"
