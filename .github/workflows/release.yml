name: Release

# Registry-first per GITFLOW.md §2:
#   1. Publish to crates.io
#   2. Publish to npm
#   3. Publish to PyPI
#   4. Only then merge release branch to main and tag.
# Triggered by pushing a release/* or hotfix/* branch.

on:
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: validate release branch
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: extract
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            VERSION="${BRANCH##*/v}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing $VERSION"
      - name: Verify Cargo.toml version matches
        run: |
          CARGO_VERSION=$(grep -m1 '^version =' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          if [ "$CARGO_VERSION" != "${{ steps.extract.outputs.version }}" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) != branch version (${{ steps.extract.outputs.version }})"
            exit 1
          fi
      - name: Verify CHANGELOG has matching entry
        run: |
          if ! grep -q "## \[${{ steps.extract.outputs.version }}\]" CHANGELOG.md; then
            echo "::warning::CHANGELOG.md does not have a section for ${{ steps.extract.outputs.version }} — be sure to update before merging"
          fi

  quality-recheck:
    name: re-run quality gate on release commit
    needs: validate
    uses: ./.github/workflows/ci.yml

  publish-crates:
    name: publish to crates.io
    needs: [validate, quality-recheck]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Dry run
        run: |
          # crates.io names are `mycelium-rcig-*`; on-disk dirs are `mycelium-*`.
          for pair in \
              "mycelium-core:mycelium-rcig-core" \
              "mycelium-hyphae:mycelium-rcig-hyphae" \
              "mycelium-pack:mycelium-rcig-pack" \
              "mycelium-cli:mycelium-rcig-cli" \
              "mycelium-mcp:mycelium-rcig-mcp"; do
            dir="${pair%:*}"
            pkg="${pair#*:}"
            if [ -d "crates/$dir" ]; then
              cargo publish -p "$pkg" --dry-run
            fi
          done
      - name: Publish
        run: |
          for pair in \
              "mycelium-core:mycelium-rcig-core" \
              "mycelium-hyphae:mycelium-rcig-hyphae" \
              "mycelium-pack:mycelium-rcig-pack" \
              "mycelium-cli:mycelium-rcig-cli" \
              "mycelium-mcp:mycelium-rcig-mcp"; do
            dir="${pair%:*}"
            pkg="${pair#*:}"
            if [ -d "crates/$dir" ]; then
              cargo publish -p "$pkg" --token "${{ secrets.CRATES_IO_TOKEN }}" || true
              # Wait for index propagation before next crate
              sleep 30
            fi
          done

  publish-npm:
    name: publish to npm
    needs: [validate, quality-recheck, publish-crates]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm
    permissions:
      id-token: write  # for provenance
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: |
          if [ -d "bindings/node" ]; then
            cd bindings/node
            npm ci
            npm publish --access public --provenance
          else
            echo "no bindings/node yet — skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: publish to PyPI
    needs: [validate, quality-recheck, publish-crates]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: pypi
    permissions:
      id-token: write  # for Trusted Publishers
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          if [ -d "bindings/python" ]; then
            pip install maturin
            cd bindings/python
            maturin publish
          else
            echo "no bindings/python yet — skipping"
          fi

  finalize:
    name: merge to main, tag, GitHub Release
    needs: [validate, publish-crates, publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
      - name: Merge release branch to main and develop
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          git config user.name "mycelium-release-bot"
          git config user.email "release-bot@mycelium.dev"

          git checkout main
          git merge --no-ff "$BRANCH" -m "chore(release): v$VERSION"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin main --tags

          git checkout develop
          git merge --no-ff "$BRANCH" -m "chore(sync): post-release v$VERSION"
          git push origin develop
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          target_commitish: main
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
      - name: Delete release branch
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git push origin --delete "$BRANCH" || true
