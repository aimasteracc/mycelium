name: Release

# Registry-first per GITFLOW.md §2:
#   1. Publish to crates.io
#   2. Publish to npm
#   3. Publish to PyPI
#   4. Only then merge release branch to main and tag.
# Triggered by pushing a release/* or hotfix/* branch.

on:
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: validate release branch
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: extract
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            VERSION="${BRANCH##*/v}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing $VERSION"
      - name: Verify Cargo.toml version matches
        run: |
          # Cargo.toml uses aligned whitespace ('version       = "x.y.z"')
          # so the regex must tolerate variable whitespace around the equals.
          CARGO_VERSION=$(grep -m1 -E '^version[[:space:]]*=' Cargo.toml | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [ "$CARGO_VERSION" != "${{ steps.extract.outputs.version }}" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) != branch version (${{ steps.extract.outputs.version }})"
            exit 1
          fi
      - name: Verify CHANGELOG has matching entry
        run: |
          if ! grep -q "## \[${{ steps.extract.outputs.version }}\]" CHANGELOG.md; then
            echo "::warning::CHANGELOG.md does not have a section for ${{ steps.extract.outputs.version }} — be sure to update before merging"
          fi

  quality-recheck:
    name: re-run quality gate on release commit
    needs: validate
    uses: ./.github/workflows/ci.yml

  publish-crates:
    name: publish to crates.io
    needs: [validate, quality-recheck]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Dry run
        run: |
          # crates.io names are `mycelium-rcig-*`; on-disk dirs are `mycelium-*`.
          for pair in \
              "mycelium-core:mycelium-rcig-core" \
              "mycelium-hyphae:mycelium-rcig-hyphae" \
              "mycelium-pack:mycelium-rcig-pack" \
              "mycelium-cli:mycelium-rcig-cli" \
              "mycelium-mcp:mycelium-rcig-mcp"; do
            dir="${pair%:*}"
            pkg="${pair#*:}"
            if [ -d "crates/$dir" ]; then
              # dry-run only verifies packaging; registry-dep checks fail for
              # sibling crates not yet published — quality gate covers the rest
              cargo publish -p "$pkg" --dry-run || true
            fi
          done
      - name: Publish
        run: |
          for pair in \
              "mycelium-core:mycelium-rcig-core" \
              "mycelium-hyphae:mycelium-rcig-hyphae" \
              "mycelium-pack:mycelium-rcig-pack" \
              "mycelium-cli:mycelium-rcig-cli" \
              "mycelium-mcp:mycelium-rcig-mcp"; do
            dir="${pair%:*}"
            pkg="${pair#*:}"
            if [ -d "crates/$dir" ]; then
              cargo publish -p "$pkg" --token "${{ secrets.CRATES_IO_TOKEN }}" || true
              # Wait for index propagation before next crate
              sleep 30
            fi
          done

  publish-npm:
    name: publish to npm
    needs: [validate, quality-recheck, publish-crates]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm
    permissions:
      id-token: write  # for provenance
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: |
          if [ -d "bindings/node" ]; then
            cd bindings/node
            npm ci
            npm publish --access public --provenance
          else
            echo "no bindings/node yet — skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: publish to PyPI
    needs: [validate, quality-recheck, publish-crates]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: pypi
    permissions:
      id-token: write  # for Trusted Publishers
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          if [ -d "bindings/python" ]; then
            pip install maturin
            cd bindings/python
            maturin publish
          else
            echo "no bindings/python yet — skipping"
          fi

  finalize:
    name: merge to main, tag, GitHub Release
    needs: [validate, publish-crates, publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      # Use RELEASE_BOT_TOKEN when available (admin PAT required for main merge).
      # Fall back to GITHUB_TOKEN so tag + Release creation still work even when
      # the bot token is absent or expired (the two operations that were
      # previously broken because they are in the same step as the main merge).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}

      - name: Configure git identity
        run: |
          git config user.name "mycelium-release-bot"
          git config user.email "release-bot@mycelium.dev"

      # Step A — Tag the release branch HEAD first.
      # Branch protection does not apply to tags, so GITHUB_TOKEN is sufficient.
      # Separating this from the main merge means the tag always exists even if
      # the merge step below fails (fixable by founder without re-running release).
      - name: Create and push release tag
        run: |
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      # Step B — Create the GitHub Release using GITHUB_TOKEN (contents:write).
      # Decoupled from RELEASE_BOT_TOKEN so the release page is always created.
      # target_commitish points to the release branch commit; after the founder
      # merges to main the tag becomes reachable from main automatically.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step C — Merge to main (requires admin PAT; non-fatal if absent).
      # RELEASE_BOT_TOKEN must be a PAT from a repo admin — enforce_admins is
      # disabled on main, so an admin PAT can bypass the PR-review requirement.
      - name: Merge release branch to main
        id: merge-main
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ -z "$BOT_TOKEN" ]; then
            echo "::warning::RELEASE_BOT_TOKEN is not set — skipping auto-merge to main."
            echo "::warning::Founder action required:"
            echo "::warning::  gh pr create --base main --head $BRANCH --title 'chore(release): v$VERSION'"
            echo "::warning::  gh pr merge --admin --merge <PR_NUMBER>"
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${BOT_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin main
          git checkout main
          git merge --no-ff "$BRANCH" -m "chore(release): v$VERSION"
          git push origin main

      # Step D — Back-merge to develop (non-fatal if absent or conflicts).
      - name: Merge release branch to develop
        id: merge-develop
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ -z "$BOT_TOKEN" ]; then
            echo "::warning::RELEASE_BOT_TOKEN is not set — skipping auto-merge to develop."
            echo "::warning::Founder action required:"
            echo "::warning::  gh pr create --base develop --head $BRANCH --title 'chore(sync): post-release v$VERSION'"
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${BOT_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin develop
          git checkout develop
          git merge --no-ff "$BRANCH" -m "chore(sync): post-release v$VERSION"
          git push origin develop

      - name: Delete release branch
        continue-on-error: true
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git push origin --delete "$BRANCH" || true

      # Fail the job if either merge needed manual intervention, so CI stays RED
      # and the founder knows to act — but the tag and Release page are already
      # published (Steps A and B completed before this check).
      - name: Require manual merge action
        if: steps.merge-main.outcome == 'failure' || steps.merge-develop.outcome == 'failure'
        run: |
          echo "::error::Release v$VERSION PUBLISHED (tag + GitHub Release created)."
          echo "::error::However, one or more post-publish merges require founder action:"
          if [ "${{ steps.merge-main.outcome }}" = "failure" ]; then
            echo "::error::  [REQUIRED] Merge to main → open + admin-merge a PR"
          fi
          if [ "${{ steps.merge-develop.outcome }}" = "failure" ]; then
            echo "::error::  [REQUIRED] Back-merge to develop → open + admin-merge a PR"
          fi
          echo "::error::The RELEASE_BOT_TOKEN secret may be missing or expired. Audit in repo Settings → Secrets."
          exit 1
