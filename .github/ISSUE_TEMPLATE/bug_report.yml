name: 🐛 Bug Report
description: Something is broken or behaves unexpectedly.
title: "bug: <short summary>"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! 🍄
        Please be precise. The Reviewer agent and human maintainers need a clear reproducer.
  - type: input
    id: version
    attributes:
      label: Mycelium version
      description: Output of `mycelium --version`
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      multiple: false
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (aarch64)
        - Windows (x86_64)
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproducer
      description: Smallest project / command that demonstrates the bug.
      placeholder: |
        ```bash
        mkdir test && cd test
        echo "def foo(): pass" > a.py
        mycelium init
        mycelium index
        mycelium query 'function.foo'
        # → unexpected output:
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack traces
      description: Run with `RUST_LOG=mycelium=debug` and paste relevant output.
      render: text
  - type: checkboxes
    id: confirmations
    attributes:
      label: Pre-flight
      options:
        - label: I searched [existing issues](https://github.com/aimasteracc/mycelium/issues?q=) for duplicates.
          required: true
        - label: I have read the [Code of Conduct](https://github.com/aimasteracc/mycelium/blob/develop/CODE_OF_CONDUCT.md).
          required: true
